<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Quinela Futbolera - $20</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; text-align: center; padding: 20px; }
        .contenedor { background: white; max-width: 500px; margin: auto; padding: 25px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .pago-info { background: #fff3cd; border: 1px solid #ffeeba; padding: 15px; border-radius: 10px; margin-bottom: 20px; color: #856404; }
        .partido { border-bottom: 1px solid #eee; padding: 15px 0; }
        input[type="text"] { width: 90%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; }
        button { padding: 10px 15px; margin: 5px; cursor: pointer; border: 1px solid #ccc; border-radius: 5px; background: white; }
        button.seleccionado { background: #28a745; color: white; border-color: #1e7e34; font-weight: bold; }
        #btnEnviar { background: #25d366; color: white; border: none; padding: 15px; width: 100%; font-size: 18px; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 20px; }
        
        /* Pantalla completa de carga */
        .loader-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999; 
            display: none; 
        }

        /* El círculo verde que gira */
        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid #28a745; 
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        /* Texto de aviso */
        .loader-text {
            color: white;
            font-family: sans-serif;
            margin-top: 15px;
            font-size: 18px;
            font-weight: bold;
            text-align: center;
            padding: 0 20px;
        }

        /* Botón de WhatsApp de respaldo */
        #btnWhatsRespaldo {
            display: none;
            background: #25d366;
            color: white;
            text-decoration: none;
            padding: 12px 25px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 25px;
            margin-top: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="contenedor">
        <h1>🏆 Quinelas GS27</h1>
        
        <div class="pago-info">
            <strong>💰 Costo: $20 MXN</strong><br>
            💳 Transferir a: <strong>5101 2596 4204 0520</strong><br>
            <em>Banco: NU - A nombre de: Angel Isaac Gtz</em>
        </div>

        <input type="text" id="nombreUsuario" placeholder="Escribe tu nombre completo" required>
        
        <div id="contenedor-partidos"></div>

        <button id="btnEnviar">✅ Guardar y Enviar Comprobante</button>
    </div>

    <div id="miLoader" class="loader-container">
        <div class="spinner" id="miSpinner"></div>
        <div class="loader-text" id="miTextoLoader">Guardando tus pronósticos en la base de datos...</div>
        <a id="btnWhatsRespaldo" href="#" target="_blank">📲 Clic aquí para enviar por WhatsApp</a>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            let partidos = []; 
            const pronosticos = {};
            
            const lista = document.getElementById('contenedor-partidos');
            const btnEnviar = document.getElementById('btnEnviar');

            async function cargarPartidosDelServidor() {
                if (!lista) return;
                try {
                    const respuesta = await fetch('/obtener-partidos');
                    partidos = await respuesta.json();
                    
                    if (partidos.length === 0) {
                        lista.innerHTML = "<p>⏳ No hay partidos cargados para esta jornada actualmente.</p>";
                        return;
                    }

                    lista.innerHTML = ""; 
                    partidos.forEach(p => {
                        const div = document.createElement('div');
                        div.className = 'partido';
                        div.innerHTML = `
                            <small style="color: #666; display: block; margin-top: 10px;">🗓️ ${p.fechaPartido || ''} - ⏰ ${p.horaPartido || ''}</small>
                            <h3 style="margin: 5px 0 10px 0;">${p.local} vs ${p.visitante}</h3>
                            <button class="btn-opcion" data-id="${p.id}" data-valor="Local">L</button>
                            <button class="btn-opcion" data-id="${p.id}" data-valor="Empate">E</button>
                            <button class="btn-opcion" data-id="${p.id}" data-valor="Visitante">V</button>
                        `;
                        lista.appendChild(div);
                    });

                    // Asignar clics a los botones creados
                    lista.querySelectorAll('.btn-opcion').forEach(boton => {
                        boton.onclick = function() {
                            const id = this.getAttribute('data-id');
                            const valor = this.getAttribute('data-valor');
                            
                            pronosticos[id] = valor;
                            
                            const hermanos = this.parentElement.querySelectorAll('.btn-opcion');
                            hermanos.forEach(b => b.classList.remove('seleccionado'));
                            this.classList.add('seleccionado');
                        };
                    });

                } catch (error) {
                    console.error("Error al cargar partidos:", error);
                    lista.innerHTML = "<p>❌ Error al cargar el calendario de partidos.</p>";
                }
            }

            cargarPartidosDelServidor();

            if (btnEnviar) {
                btnEnviar.onclick = async () => {
                    const nombre = document.getElementById('nombreUsuario').value;
                    const loader = document.getElementById('miLoader');
                    const spinner = document.getElementById('miSpinner');
                    const textoLoader = document.getElementById('miTextoLoader');
                    const btnRespaldo = document.getElementById('btnWhatsRespaldo');
                    
                    if (!nombre || Object.keys(pronosticos).length < partidos.length) {
                        alert("⚠️ Por favor completa tu nombre y todos los partidos.");
                        return;
                    }

                    loader.style.display = 'flex';
                    if(spinner) spinner.style.display = 'block';
                    if(btnRespaldo) btnRespaldo.style.display = 'none';
                    if(textoLoader) textoLoader.innerText = "Guardando tus pronósticos en la base de datos...";

                    try {
                        const respuesta = await fetch('/enviar-quinela', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ nombre, pronosticos })
                        });

                        if (!respuesta.ok) throw new Error('Error al guardar en BD');

                        const numTelefono = "523313128924"; 
                        let partidosTexto = "";
                        partidos.forEach(p => {
                            partidosTexto += `• ${p.local} vs ${p.visitante}: *${pronosticos[p.id]}*\n`;
                        });

                        let texto = `¡Hola! Ya registré mi quinela. ⚽🏆\n\n👤 *Nombre:* ${nombre}\n\n📝 *Mis Pronósticos:*\n${partidosTexto}\nAdjunto foto de mi comprobante de $20.`;
                        const urlWhastapp = `https://wa.me/${numTelefono}?text=${encodeURIComponent(texto)}`;

                        if(spinner) spinner.style.display = 'none'; 
                        if(textoLoader) textoLoader.innerHTML = "¡Datos guardados con éxito! 🎉<br><br>Tu navegador bloqueó el salto automático. Por favor, presiona el botón de abajo:";
                        
                        if(btnRespaldo) {
                            btnRespaldo.href = urlWhastapp;
                            btnRespaldo.style.display = 'inline-block';
                        }

                        window.location.href = urlWhastapp;

                    } catch (error) {
                        if(loader) loader.style.display = 'none';
                        console.error(error);
                        alert("❌ Hubo un error al conectar con el servidor. Inténtalo de nuevo.");
                    }
                };
            }
        });
    </script>
</body>
</html>
